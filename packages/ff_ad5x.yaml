template:
- light:
  - name: "AD5X - IFS: Editor de Color"
    unique_id: "ad5x_ifs_selector_color"
    state: "{{ 'on' }}"
    rgb: >
        {% set hex = states('input_text.ad5x_color_editor') %}
        {% if hex and hex.startswith('#') and hex|length == 7 %}
            {{ hex[1:3] | int(base=16) }},
            {{ hex[3:5] | int(base=16) }},
            {{ hex[5:7] | int(base=16) }}
        {% else %}
            255, 255, 255
        {% endif %} 
    turn_on:
      action: input_text.set_value
      target:
        entity_id: input_text.ad5x_color_editor
      data:
         value: "#FFFFFF"
    turn_off:
      action: input_text.set_value
      target:
        entity_id: input_text.ad5x_color_editor
      data:
        value: "#000000"
    set_rgb:
      action: input_text.set_value
      target:
        entity_id: input_text.ad5x_color_editor
      data:
        value: >
          {% set r = r | int(255) %}
          {% set g = g | int(255) %}
          {% set b = b | int(255) %}
          #{{ "%02x%02x%02x" | format(r, g, b) }}

- switch:
  - name: "AD5X - Controles: Luz de Impresora"
    unique_id: ad5x_controles_luz_impresora
    turn_on:
        - action: rest_command.ad5x_controles_luz
          data:
            estado: "open"
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.flashforge_ad5x
    turn_off:
        - action: rest_command.ad5x_controles_luz
          data:
            estado: "close"
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.flashforge_ad5x
    icon: "{{ 'mdi:lightbulb-on' if is_state_attr('sensor.flashforge_ad5x', 'lightStatus', 'open') else 'mdi:lightbulb-outline' }}"
    state: "{{ is_state_attr('sensor.flashforge_ad5x', 'lightStatus', 'open') }}"
- sensor:
  - name: "AD5X - Timelapse: Resumen"
    unique_id: "ad5x_timelapse_resumen"
    icon: mdi:image-multiple
    state: '{% set fotos = state_attr(''sensor.snapshots'', ''number_of_files'') |
      int(0) %} {% set segundos = (fotos / 24) | round(1) %} {{ fotos }} fotos  |  {{
      segundos }} seg aprox.'
  - name: "AD5X - Nombre"
    unique_id: "ad5x_nombre"
    state: "✏️  {{ state_attr('sensor.flashforge_ad5x', 'name') }}"
    icon: mdi:printer-3d
  - name: "AD5X - Firmware"
    unique_id: "ad5x_firmware"
    state: "🔍  {{ state_attr('sensor.flashforge_ad5x', 'firmwareVersion') }}"
    icon: mdi:chip
  - name: "AD5X - IP"
    unique_id: "ad5x_ip"
    state: "{{ state_attr('sensor.flashforge_ad5x', 'ipAddr') }}"
    icon: mdi:ip-network
  - name: "AD5X - MAC"
    unique_id: "ad5x_mac"
    state: "{{ state_attr('sensor.flashforge_ad5x', 'macAddr') }}"
    icon: mdi:ethernet
  - name: "AD5X - Tiempo Total Uso"
    unique_id: "ad5x_tiempo_uso_total"    
    unit_of_measurement: "h"
    state: "{{ (state_attr('sensor.flashforge_ad5x', 'cumulativePrintTime') | float / 60) | round(1) }}"
    icon: mdi:clock-outline
  - name: "AD5X - Filamento Total"
    unique_id: "ad5x_filamento_total"  
    unit_of_measurement: "m"
    state: "{{ state_attr('sensor.flashforge_ad5x', 'cumulativeFilament') | round(2) }}"    
  - name: "AD5X - Espacio Libre"
    unique_id: "ad5x_almacenamiento_libre"  
    unit_of_measurement: "GB"
    state: "{{ state_attr('sensor.flashforge_ad5x', 'remainingDiskSpace') | float | round(2) }}"
    icon: mdi:database-check
  - name: "AD5X - Uso de Disco"
    unique_id: "ad5x_almacenamiento_uso"  
    unit_of_measurement: "%"
    state: >
      {% set libre = state_attr('sensor.flashforge_ad5x', 'remainingDiskSpace') | float %}
      {% set total = 5.66 %}
      {{ ((1 - (libre / total)) * 100) | round(1) }}
    icon: mdi:database-marker
  - name: "AD5X - IFS: Estacion IFS"
    unique_id: "ad5x_ifs_estado"  
    state: >
      {% if state_attr('sensor.flashforge_ad5x', 'hasMatlStation') %}
        Presente
      {% else %}
        No detectada
      {% endif %}
    icon: mdi:view-grid      
  - name: "AD5X - Cámara: Estado"
    unique_id: "ad5x_camara_estado"
    state: >
      {% set cam = state_attr('sensor.flashforge_ad5x', 'camera') %}
      {% if cam == 2 %}
        No detectada
      {% elif cam == 1 %}
        Presente
      {% else %}
        Desconocido
      {% endif %}
    icon: >
      {% if state_attr('sensor.flashforge_ad5x', 'camera') == 2 %}
        mdi:camera-off
      {% else %}
        mdi:camera
      {% endif %}
  - name: "AD5X - Cámara: Stream URL"
    unique_id: "ad5x_camara_stream"
    state: >
      {% set url = state_attr('sensor.flashforge_ad5x', 'cameraStreamUrl') %}
      {{ url if url and url != "none" else "Sin dirección" }}
    icon: mdi:link-variant
  - name: "AD5X - Nozzle"
    unique_id: "ad5x_nozzle"  
    state: "{{ state_attr('sensor.flashforge_ad5x', 'nozzleModel') }}"
    icon: mdi:printer-3d-nozzle
  - name: "AD5X - Nozzle Z-Offset"
    unique_id: ad5x_nozzle_zoffset
    unit_of_measurement: "mm"
    state: >
      {% set z = state_attr('sensor.flashforge_ad5x', 'zAxisCompensation') %}
      {{ z | float(0) | round(3) if z is not none else 'N/A' }}
    icon: mdi:unfold-less-horizontal

  - name: "AD5X - IFS: Slot 1"
    unique_id: "ad5x_ifs_slot_1"
    icon: mdi:printer-3d-nozzle-outline
    state: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {% if info and info.slotInfos is defined and info.slotInfos[0].hasFilament %}
          {{ info.slotInfos[0].materialName }}
        {% else %}
          Vacío
        {% endif %}
    attributes:
      color: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {{ info.slotInfos[0].materialColor if info and info.slotInfos is defined else 'none' }}
      has_filament: >
        {{ state_attr('sensor.flashforge_ad5x', 'matlStationInfo').slotInfos[0].hasFilament }}        

  - name: "AD5X - IFS: Slot 2"
    unique_id: "ad5x_ifs_slot_2"
    icon: mdi:printer-3d-nozzle-outline
    state: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {% if info and info.slotInfos is defined and info.slotInfos[1].hasFilament %}
          {{ info.slotInfos[1].materialName }}
        {% else %}
          Vacío
        {% endif %}
    attributes:
      color: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {{ info.slotInfos[1].materialColor if info and info.slotInfos is defined else 'none' }}
      has_filament: >
        {{ state_attr('sensor.flashforge_ad5x', 'matlStationInfo').slotInfos[0].hasFilament }}                

  - name: "AD5X - IFS: Slot 3"
    unique_id: "ad5x_ifs_slot_3"
    icon: mdi:printer-3d-nozzle-outline
    state: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {% if info and info.slotInfos is defined and info.slotInfos[2].hasFilament %}
