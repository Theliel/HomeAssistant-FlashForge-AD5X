          color_tag: "{{ (states('input_text.ad5x_ifs_slot4_json') | from_json).color }}"
          densidad: "{{ (states('input_text.ad5x_ifs_slot4_json') | from_json).densidad | float(1.23) }}"
          peso_restante: "{{ (states('input_text.ad5x_ifs_slot4_json') | from_json).peso | float(0) }}"
          longitud_restante: "{{ (states('input_text.ad5x_ifs_slot4_json') | from_json).longitud | float(0) }}"
          fecha_apertura: "{{ (states('input_text.ad5x_ifs_slot4_json') | from_json).fecha }}"
          fecha_uso: "{{ (states('input_text.ad5x_ifs_slot4_json') | from_json).ultimo_uso }}"
          has_filament: "{{ state_attr('sensor.ad5x_ifs_slot_4', 'has_filament') }}"
          color_impresora: "{{ state_attr('sensor.ad5x_ifs_slot_4', 'color') }}"      

  - name: "AD5X - Progreso Impresión"
    unique_id: ad5x_progreso_impresion
    state: >
        {% set valor = state_attr('sensor.flashforge_ad5x', 'printProgress') %}
        {% if valor is not none and valor | float(-1) >= 0 %}
            {{ (valor | float * 100) | int }} %
        {% else %}
            --
        {% endif %}
    icon: mdi:progress-check  
 
  - name: "AD5X - Estado Detallado"
    unique_id: "ad5x_estado_detallado"
    state: >
      {% set status = states('sensor.flashforge_ad5x') %}
      {% if status == 'ready' %}
        Listo
      {% elif status == 'printing' %}
        Imprimiendo
      {% else %}
        {{ status | capitalize }}
      {% endif %}
    attributes:
      accion_texto: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {% if info %}
          {% set acciones = {
            0: 'Esperando...',
            1: 'Cargando',
            2: 'Descargando',
            3: 'Cancelando Carga/Descarga',
            4: 'Imprimiendo',
            5: 'Ocupado',
            6: 'Pausado'
          } %}
          {{ acciones.get(info.stateAction, 'Acción ' ~ info.stateAction) }}
        {% else %}
          ---
        {% endif %}
      paso_texto: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {% if info %}
          {% set pasos = {
            0: 'Sin Definir',
            1: 'Calentando',
            2: 'Empujando Filamento',
            3: 'Purgando Filamento viejo',
            4: 'Cortando Filamento',
            5: 'Retracción de Filamento',
            6: 'Completada Carga/Descarga'
          } %}
          {{ pasos.get(info.stateStep, 'Fase ' ~ info.stateStep) }}
        {% else %}
          ---
        {% endif %}
  - name: "AD5X - Tiempo de Impresión"
    unique_id: "ad5x_tiempo_impresion"
    state: >
        {% set d = state_attr('sensor.flashforge_ad5x', 'printDuration') | float(0) | int %}
        {% set e = state_attr('sensor.flashforge_ad5x', 'estimatedTime') | float(0) | int %}
        
        {% if d == 0 and e == 0 %}
          --   /   --
        {% else %}
          {% set d_h = (d // 3600) %}
          {% set d_m = (d % 3600 // 60) %}
          {% set d_s = (d % 60) %}
          {% set e_h = (e // 3600) %}
          {% set e_m = (e % 3600 // 60) %}
          {% set e_s = (e % 60) %}
          {{ "%02dh %02dm %02ds" | format(e_h, e_m, e_s) }}   /   {{ "%02dh %02dm %02ds" | format(d_h, d_m, d_s) }}
        {% endif %}
  - name: "AD5X - Temperatura Extrusor"
    unique_id: "ad5x_temp_extrusor"
    icon: mdi:thermometer-lines
    state: >
        {% set actual = state_attr('sensor.flashforge_ad5x', 'rightTemp') | float(0) | round(2) %}
        {% set objetivo = state_attr('sensor.flashforge_ad5x', 'rightTargetTemp') | float(0) | round(2) %}
        {% if objetivo > 0 %}
          {{ actual }}°C   /   {{ objetivo }}°C
        {% else %}
          {{ actual }}°C
        {% endif %}

  - name: "AD5X - Temperatura Cama"
    unique_id: "ad5x_temp_cama"
    icon: mdi:radiator
    state: >
        {% set actual = state_attr('sensor.flashforge_ad5x', 'platTemp') | float(0) | round(2) %}
        {% set objetivo = state_attr('sensor.flashforge_ad5x', 'platTargetTemp') | float(0) | round(2) %}
        {% if objetivo > 0 %}
          {{ actual }}°C   /   {{ objetivo }}°C
        {% else %}
          {{ actual }}°C
        {% endif %}
        
  - name: "AD5X - Capa Actual"
    unique_id: ad5x_capa_actual
    state: >
        {% set capa = state_attr('sensor.flashforge_ad5x', 'printLayer') %}
        {{ capa if capa is not none else '--' }}
    icon: mdi:layers-triple
    
  - name: "AD5X - Progreso Capas"
    unique_id: "ad5x_progreso_capas"
    icon: mdi:layers-triple
    state: >
        {% set actual = state_attr('sensor.flashforge_ad5x', 'printLayer') | int(0) %}
        {% set objetivo = state_attr('sensor.flashforge_ad5x', 'targetPrintLayer') | int(0) %}
        
        {% if objetivo > 0 %}
          {{ actual }}   /   {{ objetivo }}
        {% else %}
          --   /   --
        {% endif %}
    attributes:
        porcentaje_capas: >
            {% set actual = state_attr('sensor.flashforge_ad5x', 'printLayer') | int(0) %}
            {% set objetivo = state_attr('sensor.flashforge_ad5x', 'targetPrintLayer') | int(0) %}
            {% if objetivo > 0 %}
                {{ ((actual / objetivo) * 100) | round(0) }}
            {% else %}
                0
            {% endif %}

  - name: "AD5X - IFS: Material en Impresión"
    unique_id: "ad5x_ifs_material_impresion"
    icon: mdi:palette-swatch
    state: >
      {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
      {% if info is not none %}
        {% set target_id = info.currentLoadSlot | int(0) %}
        
        {% if target_id == 0 %}
          Descargado
        {% else %}
          {% set material = info.slotInfos | selectattr('slotId', 'eq', target_id) | first | default(none) %}
          {% if material is not none %}
            Slot {{ material.slotId }}  /  {{ material.materialName }}  /  {{ material.materialColor }}
          {% else %}
            Slot {{ target_id }}  /  Cargado
          {% endif %}
        {% endif %}
      {% else %}
        Sin datos
      {% endif %}
    attributes:
      color_hex: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {% if info is not none and info.currentLoadSlot | int(0) > 0 %}
          {% set target_id = info.currentLoadSlot | int %}
          {% set material = info.slotInfos | selectattr('slotId', 'eq', target_id) | first | default(none) %}
          {{ material.materialColor if material is not none else '#ffffff' }}
        {% else %}
          '#ffffff'
        {% endif %}
      entity_picture: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {% if info is not none and info.currentLoadSlot | int(0) > 0 %}
          {% set n = info.currentLoadSlot | int %}
          {% set material = info.slotInfos | selectattr('slotId', 'eq', n) | first | default(none) %}
          {% if material is not none %}
            {% set hex = material.materialColor | replace('#', '') %}
            {{ "https://ui-avatars.com/api/?name=%20&background=" ~ hex ~ "&size=128&rounded=true&margin=0.3" }}
          {% else %}
            {{ none }}
          {% endif %}
        {% else %}
          {{ none }}
        {% endif %}
          
  - name: "AD5X - Consumo Filamento"
    unique_id: "ad5x_consumo_filamento"
    icon: mdi:printer-3d-nozzle
    state: >
        {% set usado_mm = state_attr('sensor.flashforge_ad5x', 'estimatedRightLen') | float(0) %}
        {% set total_g = state_attr('sensor.flashforge_ad5x', 'estimatedRightWeight') | float(0) | round(2) %}
            
        {# Convertimos mm a metros para que sea más humano #}
        {% set usado_m = (usado_mm / 1000) | round(2) %}
            
        {% if total_g > 0 %}
            {{ usado_m }}m   /   {{ total_g }}g
        {% else %}
            --   /   --
            {% endif %}
    attributes:
        metros_usados: "{{ (state_attr('sensor.flashforge_ad5x', 'estimatedRightLen') | float(0) / 1000) | round(2) }}"
        gramos_totales: "{{ state_attr('sensor.flashforge_ad5x', 'estimatedRightWeight') | float(0) | round(2) }}"

  - name: "AD5X - Archivo Actual"
    unique_id: ad5x_archivo_actual
    state: "{{ state_attr('sensor.flashforge_ad5x', 'printFileName') | default('Inactivo', true) }}"
    icon: "mdi:file-cog-outline"
    attributes:
        entity_picture: >
            {% set mostrar_foto = ['printing', 'completed', 'paused'] %}
            {% if states('sensor.flashforge_ad5x') in mostrar_foto %}
                {% set v = as_timestamp(states.sensor.flashforge_ad5x.last_changed) | int %}
                /local/ad5x_thumb.bmp?v={{ v }}
            {% else %}
            
            {% endif %}
            
  - name: "AD5X - Velocidad Actual"
    unique_id: ad5x_velocidad_actual
    state: >
          {{ state_attr('sensor.flashforge_ad5x', 'currentPrintSpeed') | default(0, true) }}
    unit_of_measurement: "mm/s"
    icon: mdi:speedometer

  - name: "AD5X - Relleno Actual"
    unique_id: ad5x_relleno_actual
    state: >
        {% set valor = state_attr('sensor.flashforge_ad5x', 'fillAmount') | int(0) %}
        {% if valor > 0 %}
            {{ valor }} %
        {% else %}
            --
        {% endif %}
    icon: mdi:texture-box
    
  - name: "AD5X - Coordenadas XYZ"
    unique_id: ad5x_coordenadas_xyz
    icon: mdi:axis-arrow
    state: >
        {% set coords = state_attr('sensor.flashforge_ad5x', 'coordinate') %}
        {% if coords is list and coords | length >= 3 %}
            X: {{ coords[0] | round(2) }},  Y: {{ coords[1] | round(2) }},  Z: {{ coords[2] | round(2) }}
        {% else %}
            Desconocidas
        {% endif %}
    attributes:
        x: "{{ state_attr('sensor.flashforge_ad5x', 'coordinate')[0] | round(2) if state_attr('sensor.flashforge_ad5x', 'coordinate') else 0 }}"
        y: "{{ state_attr('sensor.flashforge_ad5x', 'coordinate')[1] | round(2) if state_attr('sensor.flashforge_ad5x', 'coordinate') else 0 }}"
        z: "{{ state_attr('sensor.flashforge_ad5x', 'coordinate')[2] | round(2) if state_attr('sensor.flashforge_ad5x', 'coordinate') else 0 }}"    
        
  - name: "AD5X - IFS: Color Impresora"
    unique_id: ad5x_ifs_color_impresora
    state: >
          {% set real = states('input_text.ad5x_color_editor') %}
          {% set switch = states('input_boolean.ad5x_adaptar_color_impresora') %}
          
          {% if switch == 'off' %}
            {{ real }}
          {% else %}
            {% set hex_filamento = real.replace('#','') %}
            {% if hex_filamento | length != 6 %}
              #FFFFFF
            {% else %}
              {% set r1 = (hex_filamento[0:2] | int(base=16)) %}
              {% set g1 = (hex_filamento[2:4] | int(base=16)) %}
              {% set b1 = (hex_filamento[4:6] | int(base=16)) %}
              
              {% set lista = [
                'FFFFFF','FEF043','DCF478','0ACC38','067749','0C6283','0DE2A0','75D9F3',
                '45A8F9','2750E0','46328E','A03CF7','F330F9','D4B0DC','F95D73','F72224',
                '7C4B00','F98D33','FDEBD5','D3C4A3','AF7836','898989','BCBCBC','161616'
              ] %}
              
              {% set ns = namespace(min_dist=200000, best_hex='FFFFFF') %}
              {% for hex_impresora in lista %}
                {% set r2 = (hex_impresora[0:2] | int(base=16)) %}
                {% set g2 = (hex_impresora[2:4] | int(base=16)) %}
                {% set b2 = (hex_impresora[4:6] | int(base=16)) %}
                {% set dist = ((r1 - r2)**2) + ((g1 - g2)**2) + ((b1 - b2)**2) %}
                {% if dist < ns.min_dist %}
                  {% set ns.min_dist = dist %}
                  {% set ns.best_hex = hex_impresora %}
                {% endif %}
              {% endfor %}
              {{ '#' + ns.best_hex }}
            {% endif %}
          {% endif %}
          
  - name: "AD5X - Inventario: ID Próximo"
    unique_id: ad5x_inventario_id_proximo
    state: >
        {% set año = now().year %}
        {% set numero = states('input_number.ad5x_contador_ids') | int + 1 %}
        {{ "%s-%03d" | format(año, numero) }}
  - name: "AD5X - Invetario: Total Bobinas"
    unique_id: ad5x_inventario_total_bobinas
    state: "{{ state_attr('sensor.ad5x_inventario_datos', 'lista') | count }}"


rest:
  - resource_template: "http://{{ states('input_text.ad5x_ip_rest') }}:8898/detail"
    method: POST
    scan_interval: 86400
    headers:
      Content-Type: "application/json"
    payload_template: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') }}"
      }
    sensor:
        - name: "Flashforge AD5X"
          value_template: >
            {% if value_json is defined and 'detail' in value_json %}
                {{ value_json.detail.status }}
            {% else %}
                Desconectada
            {% endif %}
          json_attributes_path: "$.detail"
          json_attributes:
            - "name"
            - "firmwareVersion"
            - "ipAddr"
            - "macAddr"
            - "status"
            - "printProgress"
            - "cumulativePrintTime"
            - "cumulativeFilament"      
            - "remainingDiskSpace"
            - "hasMatlStation"
            - "camera"
            - "cameraStreamUrl"
            - "lightStatus"
            - "matlStationInfo"
            - "printFileName"
            - "printFileThumbUrl"
            - "rightFilamentType"
            - "estimatedRightLen"
            - "estimatedRightWeight"
            - "rightTemp"
            - "rightTargetTemp"
            - "platTemp"
            - "platTargetTemp"
            - "fillAmount"
            - "printDuration"
            - "estimatedTime"
            - "printLayer"
            - "targetPrintLayer"
            - "currentPrintSpeed"
            - "printSpeedAdjust"
            - "coordinate"
            - "nozzleModel"
            - "zAxisCompensation"
            - "coolingFanSpeed"

  - resource_template: "http://{{ states('input_text.ad5x_ip_rest') }}:8898/gcodeList"
    method: POST
    scan_interval: 86400
    headers:
      Content-Type: "application/json"
    payload_template: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') }}"
      }
    sensor:
      - name: "AD5X - Controles: Lista de Archivos"
        unique_id: ad5x_controles_archivos_lista
        value_template: >
          {% if value is defined and value != "" %}
            {% if value_json is defined %}
              {{ value_json.gcodeList | length }}
            {% else %}
              Error_Parseo_JSON
            {% endif %}
          {% else %}
            Respuesta_Vacia
          {% endif %}
        json_attributes:
          - "gcodeListDetail"
          
  - resource_template: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/gcodeThumb"
    method: POST
    scan_interval: 86400
    headers:
      Content-Type: "application/json"
    payload_template: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "fileName": "{{ states('input_text.ad5x_selected_file') }}"
      }
    sensor:
      - name: "AD5X - Thumbnail"
        unique_id: ad5x_thumbnail_proxy
        value_template: "{{ value_json.code }}"
        json_attributes:
          - imageData       

rest_command:
  ad5x_renombrar_impresora:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: post
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "reName_cmd",
          "args": {
            "name": "{{ states('input_text.ad5x_nuevo_nombre') }}"
          }
        }
      }
  ad5x_actualizacion_comprobar:
    url: "{{ states('input_text.ad5x_update_server') }}"
    method: POST
    verify_ssl: false
    headers:
      Content-Type: "application/json"
      Cookie: "SessionID=666"
    payload: >-
      {"ControlVersion":{"Version":"{{states('input_text.ad5x_v_control')|trim}}"},"KernelVersion":{"Version":"{{states('input_text.ad5x_v_kernel')|trim}}"},"LibraryVersion":{"Version":"{{states('input_text.ad5x_v_library')|trim}}"},"SoftwareVersion":{"Version":"{{states('input_text.ad5x_v_software')|trim}}"},"PID":"0026","VID":"2B71"}
      
  ad5x_ifs_configurar_slot:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "msConfig_cmd",
          "args": {
            "slot": {{ slot }},
            "mt": "{{ material }}",
            "rgb": "{{ color }}"
          }
        }
      }
  ad5x_ifs_control:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "ms_cmd",
          "args": {
            "slot": {{ slot }},
            "action": {{ action }}
          }
        }
      }
  ad5x_controles_luz:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "lightControl_cmd",
          "args": {
            "status": "{{ estado }}"
          }
        }
      }
  ad5x_controles_limpieza_cama:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "stateCtrl_cmd",
          "args": {
            "action": "{{ accion }}"
          }
        }
      }
  ad5x_controles_basicos:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "jobCtl_cmd",
          "args": {
            "jobID":"",
            "action": "{{ accion }}"
          }
        }
      }      
  ad5x_controles_ajustes_imprimiendo:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "printerCtl_cmd",
          "args": {
            "zAxisCompensation": {{ z | default(state_attr('sensor.flashforge_ad5x', 'zAxisCompensation')) | float | round(3) }},
            "speed": {{ spd | default(state_attr('sensor.flashforge_ad5x', 'printSpeedAdjust')) | int }},
            "coolingFan": {{ fan | default(state_attr('sensor.flashforge_ad5x', 'coolingFanSpeed')) | int }},
            "chamberFan": 0,
            "coolingLeftFan": 0
          }
        }
      }
  ad5x_controles_impresion_interna:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/printGcode"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {% set slot_id = states('input_select.ad5x_selected_slot') | int %}
      {% set slot_sensor = 'sensor.ad5x_ifs_slot_' ~ slot_id %}
      {% set filename = states('input_text.ad5x_selected_file') %}
      
      {# Datos del G-Code seleccionado #}
      {% set file_list = state_attr('sensor.ad5x_controles_lista_de_archivos', 'gcodeListDetail') %}
      {% set file_data = file_list | selectattr('gcodeFileName', 'eq', filename) | first if file_list else none %}
      {% set raw_tool_color = file_data.gcodeToolDatas[0].materialColor if (file_data and file_data.gcodeToolDatas) else 'FFFFFF' %}
      {% set tool_color = raw_tool_color if '#' in raw_tool_color else '#' ~ raw_tool_color %}

      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "fileName": "{{ filename }}",
        "levelingBeforePrint": {{ is_state('input_boolean.ad5x_print_leveling', 'on') | lower }},
        "flowCalibration": {{ is_state('input_boolean.ad5x_print_flow', 'on') | lower }},
        "firstLayerInspection": {{ is_state('input_boolean.ad5x_print_inspection', 'on') | lower }},
        "timeLapseVideo": false,
        "useMatlStation": true,
        "gcodeToolCnt": 1,
        "materialMappings": [
          {
            "toolId": 0,
            "slotId": {{ slot_id }},
            "materialName": "{{ states(slot_sensor) }}",
            "toolMaterialColor": "{{ tool_color }}",
            "slotMaterialColor": "{{ state_attr(slot_sensor, 'color') }}"
          }
        ]
      }

  ad5x_controles_movimiento:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "moveCtrl_cmd",
          "args": {
            "axis": "{{ eje | default('z') }}",
            "delta": {{ dist | default(0) | float }}
          }
        }
      }  
  ad5x_controles_homing:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "homingCtrl_cmd"
        }
      }
  ad5x_controles_calibracion:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "calibration_cmd",
          "args": {
            "levelingDetection": {{ is_state('input_boolean.ad5x_cal_leveling', 'on') | lower }},
            "vibrationCompensation": {{ is_state('input_boolean.ad5x_cal_vibration', 'on') | lower }}
            }
        }
      }
  ad5x_controles_temperatura_cama:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {% set t = temp | default(states('input_number.ad5x_temp_manual_cama')) | int(0) %}
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "temperatureCtl_cmd",
          "args": {
            "platform": {{ t }}
          }
        }
      }
  ad5x_controles_temperatura_extrusor:
    url: "http://{{ states('input_text.ad5x_ip_rest') | trim }}:8898/control"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: >
      {% set t = temp | default(states('input_number.ad5x_temp_manual_extrusor')) | int(0) %}    
      {
        "serialNumber": "{{ states('input_text.ad5x_serial_number') | trim }}",
        "checkCode": "{{ states('input_text.ad5x_check_code') | trim }}",
        "payload": {
          "cmd": "temperatureCtl_cmd",
          "args": {
            "rightNozzle": {{ t }}
          }
        }
      }        

  ad5x_nfc_write_server:
    url: "http://{{ states('input_text.ad5x_ip_server') | trim }}/write"
    method: POST
    headers:
        Content-Type: "application/json"
    payload: '{{ datos_bobina | to_json }}'
  ad5x_nfc_read_server:
    url: "http://{{ states('input_text.ad5x_ip_server') | trim }}/read"
    method: POST
    headers:
        Content-Type: "application/json"
  ad5x_nfc_clear_server:
    url: "http://{{ states('input_text.ad5x_ip_server') | trim }}/clear"
    method: POST
    headers:
        Content-Type: "application/json"


command_line:
   - sensor:
      name: "AD5X - Controles: Archivos GCode Locales"
      unique_id: ad5x_controles_archivos_gcode_locales
      command: >
        python3 -c "import os, json;
        path = '/config/www/gcode';
        files = [{'name': f, 'size': os.path.getsize(os.path.join(path, f))} for f in os.listdir(path) if os.path.isfile(os.path.join(path, f))];
        print(json.dumps({'files': files}))"
      value_template: "{{ value_json.files | length }}"
      json_attributes:
        - files
      scan_interval: 86400
   - sensor:
       name: "AD5X - Controles: Respuesta Consola"
       unique_id: ad5x_controles_respuesta_consola
       command: >
         echo "~{{ states('input_text.ad5x_consola_gcode') }}" | nc -w 1 {{ states('input_text.ad5x_ip_rest') }} 8899
       scan_interval: 86400
       value_template: "{{ value }}"
       availability: "{{ states('input_text.ad5x_consola_gcode') not in ['', 'unknown', 'none'] }}"
   - sensor:
      name: "AD5X - Inventario"
      unique_id: ad5x_inventario_datos
      command: "python3 -c \"import json; d=json.load(open('/config/filamentos/inventario.json')); print(json.dumps({'lista': list(d.values())}))\""
      value_template: "{{ now().strftime('%H:%M') }}"
      scan_interval: 86400
      json_attributes:
        - "lista"       

shell_command:
  ad5x_actualizar_thumbnail_impresion: >
    curl -o /config/www/ad5x_thumb.bmp http://{{ states('input_text.ad5x_ip_rest') }}:8898/getThum
  ad5x_actualizacion_descargar: >
    curl -skL "{{ url }}" 
    -H "Cookie: SessionID=666" 
    --output "/config/www/ff_updates/{{ filename }}"    
  ad5x_controles_cargar_gcode: >-
    curl -X POST "http://{{ target_ip }}:8898/uploadGcode" \
      -H "Expect:" \
      -H "serialNumber: {{ serial_number }}" \
      -H "checkCode: {{ check_code }}" \
      -H "fileSize: {{ filesize }}" \
      -H "printNow: {{ print_now }}" \
      -H "levelingBeforePrint: {{ leveling }}" \
      -H "flowCalibration: {{ flow }}" \
      -H "firstLayerInspection: {{ layer }}" \
      -H "timeLapseVideo: false" \
      -H "useMatlStation: true" \
      -H "gcodeToolCnt: 1" \
      -H "materialMappings: {{ mapping }}" \
      -F "gcodeFile=@/config/www/gcode/{{ filename }};filename={{ filename }}" \
      --http1.1
  ad5x_timelapse_generar_snapshot: >
     ffmpeg -i "{{ states('input_text.ad5x_stream_camara') }}" -vf "crop=600:600:1618:935" -frames:v 1 -y "/media/grabaciones/snapshots/{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg" -vf "crop=600:600:1618:935" -frames:v 1 -y "/config/www/last_preview.jpg"
  ad5x_timelapse_compilar_video: >
     ffmpeg -framerate 24 -pattern_type glob -i "/media/grabaciones/snapshots/*.jpg" -c:v libx264 -pix_fmt yuv420p "/media/grabaciones/timelapses/{{ filename }}.mp4"
  ad5x_timelapse_limpiar_fotos: "rm /media/grabaciones/snapshots/*.jpg"
  ad5x_inventario_vuelco: >-
    python3 -c "import json, os, sys; path='/config/filamentos/inventario.json'; os.makedirs(os.path.dirname(path), exist_ok=True); db=json.load(open(path)) if os.path.exists(path) else {}; nueva=json.loads(sys.argv[1]); db[nueva['id']]=nueva; open(path, 'w').write(json.dumps(db, indent=2))" "{{ datos_json | replace('\"', '\\\"') }}"
  ad5x_inventario_sobreescribir: >-
    python3 -c "import json, sys; path='/config/filamentos/inventario.json'; data=json.loads(sys.argv[1]); open(path, 'w').write(json.dumps(data, indent=2))" "{{ lista | replace('\"', '\\\"') }}"
  ad5x_inventario_backup: >-
    python3 -c "import os, shutil; path='/config/filamentos/inventario.json'; 
    [shutil.move(f'{path}.{i}', f'{path}.{i+1}') for i in range(6, 0, -1) if os.path.exists(f'{path}.{i}')]; 
    shutil.copy(path, f'{path}.1') if os.path.exists(path) else None"

automation:
  - id: ad5x_polling_dinamico
    alias: AD5X - Polling Dinámico
    description: Para evitar la inundación de tráfico en red, si está apagada no actualiza
    triggers:
      - seconds: /5
        trigger: time_pattern
        id: polling
      - trigger: state
        entity_id: switch.smart_switch_20122298325686290d3248e1e9436c01_outlet_5
        from: "on"
        to: "off"
        id: apagado
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: polling
              - condition: state
                entity_id: switch.smart_switch_20122298325686290d3248e1e9436c01_outlet_5
                state: "on"
            sequence:
              - action: homeassistant.update_entity
                entity_id: sensor.flashforge_ad5x
          - conditions:
              - condition: trigger
                id: apagado
            sequence:
              - delay: "00:00:02"
              - action: homeassistant.update_entity
                entity_id: sensor.flashforge_ad5x

  - id: ad5x_ifs_sincronizar_material
    alias: "AD5X - IFS: Sincronizar Selector de Material con Editor"
    description: Permite sincronizar los datos del select con el campo personalizado
    triggers:
      - entity_id: input_select.ad5x_material_selected
        trigger: state
    actions:
      - if:
          - condition: template
            value_template: "{{ trigger.to_state.state != 'Personalizado' }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.ad5x_material_editor
            data:
              value: "{{ trigger.to_state.state }}"
  - id: ad5x_ifs_normalizar_inputs
    alias: "AD5X - IFS: Normalización de Inputs"
    description: Fuerza mayúsculas y quita espacios en campos críticos
    triggers:
      - entity_id:
          - input_text.ad5x_color_editor
          - input_text.ad5x_submaterial_editor
        trigger: state
    conditions:
      - condition: template
        value_template: >
          {{ states(trigger.entity_id) != states(trigger.entity_id) | upper | trim
          }}
    actions:
      - target:
          entity_id: "{{ trigger.entity_id }}"
        data:
          value: "{{ states(trigger.entity_id) | upper | trim }}"
        action: input_text.set_value
    mode: restart
  - id: ad5x_ifs_registrar_slot_imprimiendo
    alias: "AD5X - IFS: Registrar Slot Real en Uso"
    description: Se dispara una sola vez cuando la impresión arranca realmente
    triggers:
      - entity_id: sensor.flashforge_ad5x
        attribute: printLayer
        above: 0
        trigger: numeric_state
    conditions:
      - condition: state
        entity_id: sensor.flashforge_ad5x
        state: printing
    actions:
      - variables:
          slot_real: >-
            {{ state_attr('sensor.flashforge_ad5x',
            'matlStationInfo')['currentLoadSlot'] | int(0) }}
      - condition: template
        value_template: "{{ slot_real > 0 }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.ad5x_ultimo_slot
        data:
          value: "{{ slot_real }}"
          
  - id: ad5x_controles_descargar_miniatura_imprimiendo
    alias: "AD5X - Controles: Gestionar Miniatura"
    description: Descarga la miniatura cuando comienza la impresión
    triggers:
      - entity_id: sensor.flashforge_ad5x
        to: printing
        trigger: state
    actions:
      - delay:
          hours: 0
          minutes: 0
          seconds: 10
          milliseconds: 0
      - data: {}
        action: shell_command.ad5x_actualizar_thumbnail_impresion
    mode: single
  - id: ad5x_controles_finalizar_impresion
    alias: "AD5X - Controles: Finalizar Impresion"
    description: >-
      Calcula el gasto de filamento y fecha de uso, actualiza el JSON del slot
      activo
    triggers:
      - entity_id: sensor.flashforge_ad5x
        from:
          - printing
          - paused
        to:
          - completed
          - cancel
          - error
        trigger: state
    conditions:
      - condition: template
        value_template: >-
          {{ state_attr('sensor.flashforge_ad5x', 'estimatedRightLen') | float(0) >
          0 }}
    actions:
      - variables:
          slot_activo: "{{ states('input_number.ad5x_ultimo_slot') | int }}"
          usado_mm: >-
            {{ state_attr('sensor.flashforge_ad5x', 'estimatedRightLen') | float(0)
            }}
          impuesto_purga: 170
          entidad_json: input_text.ad5x_ifs_slot{{ slot_activo }}_json
          datos: "{{ states(entidad_json) | from_json }}"
          nueva_L: "{{ (datos.longitud | float - usado_mm - impuesto_purga) | round(2) }}"
          nuevo_P: "{{ (nueva_L | float * (datos.densidad | float) * 2.4053 / 1000) | round(1) }}"
      - action: script.ad5x_ifs_actualizar_json_slot
        data:
              slot_id: "{{ slot_activo }}"
              volcar: true
              id: "{{ datos.id }}"
              material: "{{ datos.material }}"
              submaterial: "{{ datos.submaterial }}"
              color: "{{ datos.color }}"
              densidad: "{{ datos.densidad }}"
              longitud: "{{ nueva_L }}"
              peso: "{{ nuevo_P }}"
              fabricante: "{{ datos.fabricante }}"
              fecha: "{{ datos.fecha }}"
              ultimo_uso: "{{ now().strftime('%Y-%m-%d %H:%M') }}"


  - id: ad5x_controles_actualizar_lista_gcode
    alias: "AD5X - Controles: Actualizar lista de archivos GCODE y 3MF"
    description: Rellena un Select con los archivos disponibles para imprimir
    triggers:
      - entity_id: sensor.gcode
        trigger: state
      - event: start
        trigger: homeassistant
    actions:
      - delay: "00:00:01"
      - target:
          entity_id: input_select.ad5x_archivo_imprimir
        data:
          options: >
            {% set files = state_attr('sensor.gcode', 'file_list') %} {% if files is
            not none and files | count > 0 %}
              {% set ns = namespace(nombres=[]) %}
              {% for f in files %}
                {% if f.lower().endswith('.gcode') or f.lower().endswith('.3mf') %}
                  {% set nombre = f.split('/')[-1] %}
                  {% set ns.nombres = ns.nombres + [nombre] %}
                {% endif %}
              {% endfor %}
              {{ ns.nombres if ns.nombres | count > 0 else ['No hay archivos válidos'] }}
            {% else %}
              {{ ['Carpeta vacía'] }}
            {% endif %}
        action: input_select.set_options
    mode: single

  - id: ad5x_timelapse_guardian
    alias: "AD5X - Timelapse: Guardián de Timelapse"
    triggers:
      - entity_id: switch.chuangmi_079ae2_aa9f_switch_status
        to: "off"
        trigger: state
      - entity_id: input_select.ad5x_timelapse_mode
        trigger: state
    conditions:
      - condition: state
        entity_id: switch.chuangmi_079ae2_aa9f_switch_status
        state: "off"
      - condition: template
        value_template: "{{ states('input_select.ad5x_timelapse_mode') != 'Desactivado' }}"
    actions:
      - delay: "00:00:00.500"
      - target:
          entity_id: input_select.ad5x_timelapse_mode
        data:
          option: Desactivado
        action: input_select.select_option
    mode: parallel
    max: 10

  - id: ad5x_timelapse_controles
    alias: "AD5X - Timelapse: Control de Timelapse"
    description: Gestiona capturas por capa, 30s o 60s según el selector
    triggers:
      - trigger: state
        entity_id: sensor.ad5x_capa_actual
      - trigger: time_pattern
        seconds: /30
    conditions:
      - condition: state
        entity_id: sensor.flashforge_ad5x
        state: printing
      - condition: template
        value_template: "{{ states('input_select.ad5x_timelapse_mode') != 'Desactivado' }}"
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.ad5x_timelapse_mode
                state: Por Capa
              - condition: template
                value_template: "{{ trigger.platform == 'state' }}"
            sequence:
              - action: shell_command.ad5x_timelapse_generar_snapshot
              - action: homeassistant.update_entity
                target:
                  entity_id:
                    - sensor.snapshots
          - conditions:
              - condition: state
                entity_id: input_select.ad5x_timelapse_mode
                state: 30s
              - condition: template
                value_template: "{{ trigger.platform == 'time_pattern' }}"
            sequence:
              - action: shell_command.ad5x_timelapse_generar_snapshot
              - action: homeassistant.update_entity
                target:
                  entity_id:
                    - sensor.snapshots
          - conditions:
              - condition: state
                entity_id: input_select.ad5x_timelapse_mode
                state: 60s
              - condition: template
                value_template: "{{ trigger.platform == 'time_pattern' and now().second == 0 }}"
            sequence:
              - action: shell_command.ad5x_timelapse_generar_snapshot
              - action: homeassistant.update_entity
                target:
                  entity_id:
                    - sensor.snapshots


  - id: ad5x_timelapse_finalizar
    alias: "AD5X - Timelapse: Finalizar y Procesar Timelapse"
    description: >-
      Al terminar la impresión, genera el vídeo y limpia si el modo no era
      Desactivado
    triggers:
      - entity_id: sensor.flashforge_ad5x
        to: completed
        trigger: state
    conditions:
      - condition: template
        value_template: "{{ states('input_select.ad5x_timelapse_mode') != 'Desactivado' }}"
      - condition: numeric_state
        entity_id: sensor.snapshots
        attribute: number_of_files
        above: 0
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.ad5x_timelapse_mode
        data:
          option: Desactivado
      - action: script.ad5x_timelapse_generar
  - id: ad5x_inventario_actualizar_ids
    alias: "AD5X - Inventario: Actualizar Lista IDs"
    description: Permite popular los IDs en un Select para la selección
    triggers:
      - trigger: state
        entity_id: sensor.ad5x_inventario_datos
      - trigger: homeassistant
        event: start
      - trigger: event
        event_type: automation_reloaded
    actions:
      - delay: "00:00:05"
      - target:
          entity_id: input_select.ad5x_selected_inventory
        data:
          options: >
            {% set lista = state_attr('sensor.ad5x_inventario_datos', 'lista') %} {%
            if lista is not none %}
              {{ lista | map(attribute='id') | list }}
            {% else %}
              {{ state_attr('input_select.ad5x_selected_inventory', 'options') }}
            {% endif %}
        action: input_select.set_options
  - id: ad5x_inventario_respando_diario
    alias: "AD5X - Inventario: Respaldo Diario"
    description: Crea una copia de seguridad rotativa de 7 días del archivo de inventario
    triggers:
      - at: "00:00:00"
        trigger: time
    actions:
      - action: shell_command.ad5x_inventario_backup

  - id: ad5x_nfc_bobina_nueva_origen
    alias: "AD5X - NFC: Respuesta Notificación Bobina Nueva"
    description: Capturamos y actuamos en función de si añadimos bobina nueva desde el móvil
    triggers:
      - event_type: mobile_app_notification_action
        event_data:
          action: WRITE_NFC_NOW
        trigger: event
    actions:
      - action: script.ad5x_nfc_write_bobina
        data:
          id_bobina: "{{ states('input_text.ad5x_id_editor') }}"
          origen: mobile
  - id: ad5x_nfc_bobina_nueva_detector
    alias: "AD5X - NFC: Detector de Nueva Bobina y aviso para Escritura en Tag"
    description: >-
      Se dispara cuando se escribe una bobina nueva en la DB, con lo que nos permite
      o escribir un tag o aumentar de forma real el ID autogenerado
    triggers:
      - entity_id: sensor.ad5x_total_bobinas
        trigger: state
    actions:
      - condition: template
        value_template: "{{ trigger.to_state.state | int > trigger.from_state.state | int }}"
      - delay: "00:00:01"
      - action: input_number.increment
        target:
          entity_id: input_number.ad5x_contador_ids
      - data:
          title: 🆕 Nueva bobina
          message: ¿Grabar TAG para ID {{ states('input_text.ad5x_id_editor') }}?
          data:
            tag: nfc_workflow_mobile
            priority: high
            ttl: 0
            importance: high
            actions:
              - action: WRITE_NFC_NOW
                title: Grabar ahora 📶
              - action: CANCEL
                title: Luego
        action: notify.mobile_app_your_phone
        continue_on_error: true
      - data:
          title: NFC Pendiente
          message: >-
            Se ha registrado la bobina **{{ states('input_text.ad5x_id_editor')
            }}**. Pulsa para grabar.
          notification_id: nfc_pending
        action: persistent_notification.create
      - action: browser_mod.popup
        data:
          title: 🆕 ¡Bobina Registrada!
          id: nfc_workflow
          content:
            type: vertical-stack
            cards:
              - type: markdown
                content: >
                  ## ¡Registro completado!

                  Se ha guardado la bobina con ID: **{{
                  states('input_text.ad5x_id_editor') }}**.


                  ¿Quieres preparar la grabación del **Tag NFC** ahora?
              - type: horizontal-stack
                cards:
                  - type: custom:button-card
                    name: SÍ, PREPARAR
                    color: green
                    tap_action:
                      action: call-service
                      service: script.ad5x_nfc_write_bobina
                  - type: custom:button-card
                    name: LUEGO
                    styles:
                      card:
                        - background-color: rgba(255, 0, 0, 0.1)
                        - border: 1px solid red
                    tap_action:
                      action: fire-dom-event
                      browser_mod:
                        service: browser_mod.close_popup
                        data:
                          browser_id: THIS



  - id: ad5x_nfc_lectura_automatica
    alias: "AD5X - NFC: Gestión Interactiva"
    description: >-
      Leer el contenido del Tag y mostrar su contenido en las notificaciones, así
      como cargarlo en la impresora
    triggers:
      - event_type: tag_scanned
        trigger: event
      - event_type: mobile_app_notification_action
        event_data:
          tag: nfc_scan_process
        trigger: event
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.event_type == 'tag_scanned' }}"
              - condition: template
                value_template: "{{ trigger.event.data.tag_id is search('^202[0-9]-[0-9]+$') }}"
            sequence:
              - variables:
                  id_tag: "{{ trigger.event.data.tag_id }}"
                  bobina: >
                    {% set datos = state_attr('sensor.ad5x_inventario_datos',
                    'lista') %} {{ datos | selectattr('id', 'eq', id_tag) | first if
                    datos is not none else none }}
              - if:
                  - condition: template
                    value_template: "{{ bobina is none }}"
                then:
                  - action: notify.mobile_app_your_phone
                    data:
                      title: ⚠️ Bobina Desconocida
                      message: El ID {{ id_tag }} no existe en la base de datos.
                      data:
                        tag: nfc_scan_process
                        ttl: 0
                        priority: high
                else:
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.ad5x_nfc_ultimo_id
                    data:
                      value: "{{ id_tag }}"
                  - action: notify.mobile_app_your_phone
                    data:
                      title: "🧵\_ {{ bobina.id }} \_|\_\_♟️ {{ bobina.material }}"
                      message: "{{ color_icon }}\_\_🎨\_\_{{ bobina.color }}\_\_|\_\_🧶\_\_{{ bobina.submaterial }}\_\_|\_\_ ⚖️\_\_{{ bobina.peso }}g\_\_|\_\_🏢\_\_{{ bobina.fabricante }}\_\_|\_\_ 📅\_\_UltUso: {{ bobina.ultimo_uso }}\n"
                      data:
                        tag: nfc_scan_process
                        priority: high
                        ttl: 0
                        importance: high
                        color: "{{ bobina.color }}"
                        image: >-
                          https://dummyimage.com/100x100/{{ bobina.color[1:] }}/{{
                          bobina.color[1:] }}.png
                        actions:
                          - action: NFC_CARGAR_PAGE_1
                            title: Cargar
                          - action: NFC_IGNORAR
                            title: Ignorar
              - delay: "00:00:20"
              - action: notify.mobile_app_your_phone
                data:
                  message: clear_notification
                  data:
                    tag: nfc_scan_process
          - conditions:
              - condition: template
                value_template: >-
                  {{ trigger.event.data.action in ['NFC_CARGAR_PAGE_1',
                  'NFC_VOLVER'] }}
            sequence:
              - action: notify.mobile_app_your_phone
                data:
                  title: 📥 Selecciona Slot (1/2)
                  message: Elige ubicación para la bobina detectada
                  data:
                    tag: nfc_scan_process
                    actions:
                      - action: NFC_SLOT_1
                        title: Slot 1
                      - action: NFC_SLOT_2
                        title: Slot 2
                      - action: NFC_CARGAR_PAGE_2
                        title: Sig. >
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.action == 'NFC_CARGAR_PAGE_2' }}"
            sequence:
              - action: notify.mobile_app_your_phone
                data:
                  title: 📥 Selecciona Slot (2/2)
                  message: Elige ubicación para la bobina detectada
                  data:
                    tag: nfc_scan_process
                    actions:
                      - action: NFC_VOLVER
                        title: < Volver
                      - action: NFC_SLOT_3
                        title: Slot 3
                      - action: NFC_SLOT_4
                        title: Slot 4
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.action is search('NFC_SLOT_') }}"
            sequence:
              - variables:
                  slot_num: "{{ trigger.event.data.action.split('_')[2] }}"
                  impresora_ready: "{{ is_state('sensor.flashforge_ad5x', 'ready') }}"
              - action: script.ad5x_cargar_desde_inventario
                continue_on_error: true
                data:
                  id_tag: "{{ states('input_text.ad5x_nfc_ultimo_id') }}"
                  slot_tag: "{{ slot_num }}"
              - action: notify.mobile_app_your_phone
                data:
                  title: >-
                    {{ '✅ Cargada y Enviada' if impresora_ready else '⚠️ Cargada
                    (Offline)' }}
                  message: |
                    {% if impresora_ready %}
                      Bobina {{ id_tag }} configurada en el Slot {{ slot_num }} y enviada a la impresora.
                    {% else %}
                      Bobina {{ id_tag }} asignada al Slot {{ slot_num }} localmente. 
                      La impresora no está lista (Estado: {{ states('sensor.flashforge_ad5x') }}). 
                      Recuerda sincronizar cuando esté online.
                    {% endif %}
                  data:
                    tag: nfc_scan_process
              - delay: "00:00:05"
              - action: notify.mobile_app_your_phone
                data:
                  message: clear_notification
                  data:
                    tag: nfc_scan_process
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.action == 'NFC_IGNORAR' }}"
            sequence:
              - action: notify.mobile_app_your_phone
                data:
                  message: clear_notification
                  data:
                    tag: nfc_scan_process
    mode: restart



script:
    ad5x_renombrar:
        alias: "AD5X - Renombrado"
        sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.ad5x_nuevo_nombre
              data:
                value: "{{ state_attr('sensor.flashforge_ad5x', 'name') }}"
            - service: browser_mod.popup
              data:
                title: "Renombrar Impresora"
                content:
                  type: entities
                  entities:
                    - entity: input_text.ad5x_nuevo_nombre
                      name: "Nuevo Nombre"
                right_button: "Confirmar"
                right_button_action:
                  - service: rest_command.ad5x_renombrar_impresora
                  - service: browser_mod.close_popup
    ad5x_actualizacion_buscar:
      alias: "AD5X - Actualizar: Buscar Actualización"
      sequence:
        - action: rest_command.ad5x_actualizacion_comprobar
          response_variable: update_res

        - variables:
            repo: "{{ update_res.content | from_json }}"

        - action: browser_mod.popup
          data:
            title: "🚀 Centro de Actualización AD5X"
            style: |
              --popup-min-width: 500px;
              --popup-margin-top: 10vh;
            content:
              type: vertical-stack
              cards:
                # --- 1. SOFTWARE ---
                - type: custom:mushroom-template-card
                  primary: >
                    {% if repo.SoftwarePackage.Version is defined %} Software v{{ repo.SoftwarePackage.Version }} {% else %} Software al día {% endif %}
                  secondary: >
                    {% if repo.SoftwarePackage.Version is defined %} Nueva versión disponible {% else %} v{{ states('input_text.ad5x_v_software') }} {% endif %}
                  icon: "{{ 'mdi:package-up' if repo.SoftwarePackage.Version is defined else 'mdi:check-decagram' }}"
                  icon_color: "{{ 'green' if repo.SoftwarePackage.Version is defined else 'blue' }}"
                  tap_action:
                    action: "{{ 'call-service' if repo.SoftwarePackage.Version is defined else 'none' }}"
                    service: script.ad5x_actualizacion_descargar
                    service_data:
                      url: "{{ repo.SoftwarePackage.get('URL', '') }}"
                      filename: "{{ repo.SoftwarePackage.get('URL', '').split('/')[-1] if repo.SoftwarePackage.get('URL') else '' }}"

                # --- 2. CONTROL ---
                - type: custom:mushroom-template-card
                  primary: >
                    {% if repo.ControlPackage.Version is defined %} Control v{{ repo.ControlPackage.Version }} {% else %} Control al día {% endif %}
                  secondary: >
                    {% if repo.ControlPackage.Version is defined %} Nueva versión disponible {% else %} v{{ states('input_text.ad5x_v_control') }} {% endif %}
                  icon: mdi:controller-classic
                  icon_color: "{{ 'orange' if repo.ControlPackage.Version is defined else 'grey' }}"
                  tap_action:
                    action: "{{ 'call-service' if repo.ControlPackage.Version is defined else 'none' }}"
                    service: script.ad5x_actualizacion_descargar
                    service_data:
                      url: "{{ repo.ControlPackage.get('URL', '') }}"
                      filename: "{{ repo.ControlPackage.get('URL', '').split('/')[-1] if repo.ControlPackage.get('URL') else '' }}"

                # --- 3. KERNEL ---
                - type: custom:mushroom-template-card
                  primary: >
                    {% if repo.KernelPackage.Version is defined %} Kernel v{{ repo.KernelPackage.Version }} {% else %} Kernel al día {% endif %}
                  secondary: >
                    {% if repo.KernelPackage.Version is defined %} Actualización de sistema {% else %} v{{ states('input_text.ad5x_v_kernel') }} {% endif %}
                  icon: mdi:linux
                  icon_color: "{{ 'yellow' if repo.KernelPackage.Version is defined else 'grey' }}"
                  tap_action:
                    action: "{{ 'call-service' if repo.KernelPackage.Version is defined else 'none' }}"
                    service: script.ad5x_actualizacion_descargar
                    service_data:
                      url: "{{ repo.KernelPackage.get('URL', '') }}"
                      filename: "{{ repo.KernelPackage.get('URL', '').split('/')[-1] if repo.KernelPackage.get('URL') else '' }}"

                # --- 4. LIBRARY (NIM) ---
                - type: custom:mushroom-template-card
                  primary: >
                    {% if repo.LibraryPackage.Version is defined %} Library v{{ repo.LibraryPackage.Version }} {% else %} Library al día {% endif %}
                  secondary: >
                    {% if repo.LibraryPackage.Version is defined %} Actualización de librerías {% else %} v{{ states('input_text.ad5x_v_library') }} {% endif %}
                  icon: mdi:library-shelves
                  icon_color: "{{ 'deep-purple' if repo.LibraryPackage.Version is defined else 'grey' }}"
                  tap_action:
                    action: "{{ 'call-service' if repo.LibraryPackage.Version is defined else 'none' }}"
                    service: script.ad5x_actualizacion_descargar
                    service_data:
                      url: "{{ repo.LibraryPackage.get('URL', '') }}"
                      filename: "{{ repo.LibraryPackage.get('URL', '').split('/')[-1] if repo.LibraryPackage.get('URL') else '' }}"

                # --- NOTAS DE VERSIÓN (Dinámicas) ---
                - type: markdown
                  content: >
                    {% set sw = repo.SoftwarePackage.Version is defined %}
                    {% set ctrl = repo.ControlPackage.Version is defined %}
                    {% set kern = repo.KernelPackage.Version is defined %}
                    {% set lib = repo.LibraryPackage.Version is defined %}

                    {% if sw or ctrl or kern or lib %}
                      {% if sw %}
                      **🚀 Software v{{ repo.SoftwarePackage.Version }}:**
                      {{ repo.SoftwarePackage.DescriptionEN }}
                      {% endif %}

                      {% if ctrl %}
                      {{ '***' if sw else '' }}
                      **🎮 Control v{{ repo.ControlPackage.Version }}:**
                      {{ repo.ControlPackage.DescriptionEN }}
                      {% endif %}

                      {% if kern %}
                      {{ '***' if sw or ctrl else '' }}
                      **🐧 Kernel v{{ repo.KernelPackage.Version }}:**
                      {{ repo.KernelPackage.DescriptionEN }}
                      {% endif %}

                      {% if lib %}
                      {{ '***' if sw or ctrl or kern else '' }}
                      **📚 Library v{{ repo.LibraryPackage.Version }}:**
                      {{ repo.LibraryPackage.DescriptionEN }}
                      {% endif %}
                    {% else %}
                      ✨ **Firmware Actualizadas.**
                    {% endif %}
    ad5x_actualizacion_descargar:
      alias: "AD5X - Actualizar: Descargar Actulización"
      sequence:
        - action: persistent_notification.create
          data:
            title: "⏳ Descarga iniciada"
            message: "Descargando {{ filename }} desde los servidores de Flashforge..."
            notification_id: "ad5x_download_status"

        - action: shell_command.ad5x_actualizacion_descargar
          data:
            url: "{{ url }}"
            filename: "{{ filename }}"

        - action: persistent_notification.create
          data:
            title: "✅ Archivo listo"
            message: >
              Se ha descargado **{{ filename }}**.
              
              [📥 Haz clic aquí para guardarlo en tu dispositivo](/local/ff_updates/{{ filename }})
            notification_id: "ad5x_download_status"
    ad5x_ifs_slot_nuevo:
      alias: "AD5X - IFS: Inicializar Slot (NFC o Manual)"
      fields:
        slot_tag:
          description: "ID del slot detectado por NFC"
          example: "3"
      sequence:
        - variables:
            target_slot: >
              {% set tag = slot_tag if slot_tag is defined else none %}
              {% if tag != none %}
                {{ tag | string }}
              {% else %}
                {{ states('input_select.ad5x_selected_slot') | string }}
              {% endif %}
            
            nuevo_num: "{{ (states('input_number.ad5x_contador_ids') | int) + 1 }}"
            año: "{{ now().year }}"
            id_generated: "{{ '%s-%03d' | format(año, nuevo_num) }}"

        - if:
            - condition: template
              value_template: "{{ target_slot | string not in ['1', '2', '3', '4'] }}"
          then:
            - stop: "El ID de slot no es válido o está fuera de rango"

        - action: script.ad5x_ifs_actualizar_json_slot
          data:
            volcar: false
            slot_id: "{{ target_slot }}"
            id: "{{ id_generated }}"
            fabricante: "Genérico"
            material: "Nuevo"
            submaterial: "-"
            peso: 1000
            densidad: 1.24
            longitud: 0
            color: "#FFFFFF"
            fecha: "{{ now().strftime('%Y-%m-%d') }}"
            ultimo_uso: ""            
    ad5x_ifs_configurar_slot:
      alias: "AD5X - IFS: Configuración de Slot"
      mode: restart
      fields:
        slot_id:
          description: "ID del slot (1-4)"
      sequence:
        - action: input_select.select_option
          target: { entity_id: input_select.ad5x_selected_slot }
          data: { option: "{{ slot_id }}" }
        
        - action: input_select.select_option
          target: { entity_id: input_select.ad5x_material_selected }
          data:
            option: >
              {% set mat = states('sensor.ad5x_ifs_slot_' ~ slot_id) | trim %}
              {% set opciones = state_attr('input_select.ad5x_material_selected', 'options') %}
              {% if mat in opciones %}
                {{ mat }}
              {% else %}
                Personalizado
              {% endif %}

        - action: input_text.set_value
          target: { entity_id: input_text.ad5x_color_editor }
          data:
            value: >
              {% set j = states('input_text.ad5x_ifs_slot' ~ slot_id ~ '_json') | from_json %}
              {{ j.color | default('#FFFFFF') }}
        - action: input_text.set_value
          target: { entity_id: input_text.ad5x_material_editor }
          data:
            value: >
              {% set mat = states('sensor.ad5x_ifs_slot_' ~ slot_id) | trim %}
              {% set opciones = state_attr('input_select.ad5x_material_selected', 'options') %}
              {% if mat in opciones %}
                {{ mat }}
              {% else %}
                {{ mat }}
              {% endif %}
        - action: input_text.set_value
          target: { entity_id: input_text.ad5x_id_editor }
          data:
            value: >
              {% set j = states('input_text.ad5x_ifs_slot' ~ slot_id ~ '_json') | from_json %}
