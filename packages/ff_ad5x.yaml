    ad5x_controles_cargar_gcode:
      alias: "AD5X - Controles: Cargar G-Code"
      sequence:
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.ad5x_controles_archivos_gcode_locales
            
        - delay: "00:00:02"

        - variables:
            serial: "{{ states('input_text.ad5x_serial_number') | trim }}"
            code: "{{ states('input_text.ad5x_check_code') | trim }}"
            ip_impresora: "{{ states('input_text.ad5x_ip_rest') | trim }}"
            archivo: "{{ states('input_select.ad5x_archivo_imprimir') }}"
            lista_archivos: "{{ state_attr('sensor.ad5x_controles_archivos_gcode_locales', 'files') }}"
            tamano_bytes: >
              {% if lista_archivos is not none %}
                {{ lista_archivos | selectattr('name', 'eq', archivo) | map(attribute='size') | first | default(0) }}
              {% else %} 0 {% endif %}
            slot_id: "{{ states('input_select.ad5x_selected_slot') | int }}"
            slot_sensor: "sensor.ad5x_ifs_slot_{{ states('input_select.ad5x_selected_slot') | int }}"
            mapping_b64: >-
              {% set mapping_json = [{
                "toolId": 0,
                "slotId": slot_id | int,
                "materialName": states(slot_sensor),
                "toolMaterialColor": "#FFFFFF",
                "slotMaterialColor": state_attr(slot_sensor, 'color') | default('#FFFFFF')
              }] %}
              {{ mapping_json | to_json | base64_encode }}

        - service: shell_command.ad5x_controles_cargar_gcode
          data:
            target_ip: "{{ ip_impresora }}"
            serial_number: "{{ serial }}"
            check_code: "{{ code }}"
            filename: "{{ archivo }}"
            filesize: "{{ tamano_bytes }}"
            print_now: "{{ 'true' if is_state('input_boolean.ad5x_print_now', 'on') else 'false' }}"
            leveling: "{{ 'true' if is_state('input_boolean.ad5x_print_leveling', 'on') else 'false' }}"
            flow: "{{ 'true' if is_state('input_boolean.ad5x_print_flow', 'on') else 'false' }}"
            layer: "{{ 'true' if is_state('input_boolean.ad5x_print_inspection', 'on') else 'false' }}"
            mapping: "{{ mapping_b64 }}"
    ad5x_controles_ejecutar_gcode:
        alias: "AD5X - Controles: Ejecutar G-Code Raw"
        sequence:
          - service: homeassistant.update_entity
            target:
              entity_id: sensor.ad5x_controles_respuesta_consola
          - service: browser_mod.notification
            data:
              duration: 10000
              title: "Respuesta AD5X"
              message: "{{ states('sensor.ad5x_controles_respuesta_consola') }}"
          - service: input_text.set_value
            target:
                entity_id: input_text.ad5x_consola_gcode
            data:
                value: ""    

    ad5x_timelapse_generar:
      alias: "AD5X - Timelapse: Generar y Limpiar Timelapse"
      variables:
        video_name: "{{ now().strftime('%Y%m%d_%H%M%S') }}"
      sequence:
        - action: notify.persistent_notification
          data:
            title: "🎬 Timelapse"
            message: "Compilando {{ state_attr('sensor.snapshots', 'number_of_files') }} fotos..."
        
        - action: shell_command.ad5x_timelapse_compilar_video
          data:
            filename: "{{ video_name }}"
        - action: shell_command.ad5x_timelapse_limpiar_fotos
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.snapshots
        - action: notify.persistent_notification
          data:
            title: "✅ Proceso completado"
            message: "Vídeo {{ video_name }} creado y fotos borradas."
        - action: notify.mobile_app_your_phone
          continue_on_error: true
          data:
            title: "✅ Timelapse de impresión listo"
            message: "Se han procesado todas las capas."
            data:
              video: "/media/local/grabaciones/timelapses/{{ video_name }}.mp4"
              clickAction: "/media-browser"
            

    ad5x_timelapse_borrar_snapshots:
      alias: "AD5X - Timelapse: Limpiar Temporales"
      sequence:
        - service: shell_command.ad5x_timelapse_limpiar_fotos
        - service: homeassistant.update_entity
          target:
            entity_id: sensor.snapshots
        - service: notify.persistent_notification
          data:
            message: "Carpeta de fotos vaciada."
            
    ad5x_timelapse_manual_snapshot:
      alias: "AD5X - Timelapse: Captura Manual y Refresco"
      icon: mdi:camera-plus
      sequence:
        - service: shell_command.ad5x_timelapse_generar_snapshot
        - delay: "00:00:02"
        - service: homeassistant.update_entity
          target:
            entity_id: sensor.snapshots
      mode: single

    ad5x_inventario_cargar:
      alias: "AD5X - Inventario: Cargar datos en Slot"
      mode: queued
      fields:
        id_tag:
          description: "ID de la bobina (opcional, si viene de NFC)"
        slot_tag:
          description: "Slot de destino (opcional, si viene de NFC)"  
        solo_local:
          description: "Si es true, no envía el comando REST a la impresora"
          default: false
      sequence:
        - variables:
            id_seleccionado: "{{ id_tag if id_tag is defined else states('input_select.ad5x_selected_inventory') }}"
            slot_destino: "{{ slot_tag if slot_tag is defined else states('input_select.ad5x_selected_slot') }}"
            es_solo_local: "{{ solo_local | default(false) }}"
            bobina: >
              {% set datos = state_attr('sensor.ad5x_inventario_datos', 'lista') %}
              {{ datos | selectattr('id', 'eq', id_seleccionado) | first if datos is not none else none }}

        - condition: template
          value_template: "{{ bobina is not none }}"

        - action: input_text.set_value
          target:
            entity_id: input_text.ad5x_color_editor
          data:
            value: "{{ bobina.color }}"
        
        - action: input_text.set_value
          target:
            entity_id: input_text.ad5x_material_editor
          data:
            value: "{{ bobina.material }}"

        - action: script.ad5x_ifs_actualizar_json_slot
          data:
            volcar: false
            slot_id: "{{ slot_destino }}"
            id: "{{ bobina.id }}"
            material: "{{ bobina.material }}"
            submaterial: "{{ bobina.submaterial | default('') }}"
            color: "{{ bobina.color }}"
            densidad: "{{ bobina.densidad | default(1.24) }}"
            peso: "{{ bobina.peso | default(0) }}"
            longitud: "{{ bobina.longitud | default(0) }}"
            fabricante: "{{ bobina.fabricante | default('') }}"
            fecha: "{{ bobina.fecha | default('') }}"
            ultimo_uso: "{{ bobina.ultimo_uso | default('') }}"

        - if:
            - condition: template
              value_template: "{{ not es_solo_local }}"
          then:
            - delay: "00:00:02"
            - action: rest_command.ad5x_ifs_configurar_slot
              data:
                slot: "{{ slot_destino | int }}"
                material: "{{ bobina.material }}"
                color: "{{ states('sensor.ad5x_ifs_color_impresora') }}"

        - action: browser_mod.notification
          data:
            duration: 3000
            message: "Bobina {{ id_seleccionado }} cargada con éxito en Slot {{ slot_destino }}"
    ad5x_inventario_borrar_bobina:
      alias: "AD5X - Inventario: Borrar Bobina"
      sequence:
        - variables:
            id_sel: "{{ states('input_select.ad5x_selected_inventory') }}"
            lista_del_sensor: "{{ state_attr('sensor.ad5x_inventario_datos', 'lista') }}"
            nuevo_json_string: >
              {% set lista_filtrada = lista_del_sensor | rejectattr('id', 'eq', id_sel) | list %}
              {% set ns = namespace(dict={}) %}
              {% for item in lista_filtrada %}
                {# Usamos el ID del item como clave y el item como valor #}
                {% set ns.dict = dict(ns.dict, **{item.id: item}) %}
              {% endfor %}
              {{ ns.dict | to_json }}

        - condition: template
          value_template: "{{ id_sel not in ['none', 'unknown', ''] and lista_del_sensor is not none }}"
        - action: shell_command.ad5x_inventario_sobreescribir
          data:
            lista: "{{ nuevo_json_string }}"
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.ad5x_inventario_datos

        - action: notify.persistent_notification
          data:
            title: "Inventario"
            message: "Bobina {{ id_sel }} eliminada. El archivo ha sido reconstruido como diccionario."

    ad5x_nfc_operaciones_tag:
      alias: "AD5X - NFC: Ejecutar Operación PC"
      sequence:
        - variables:
            operacion: "{{ states('input_select.ad5x_nfc_operacion') }}"
            slot: "{{ states('input_select.ad5x_selected_slot') | replace('Slot ', '') }}"

        - choose:
            # --- CASO COMPROBAR / LEER ---
            - conditions:
                - condition: template
                  value_template: "{{ operacion in ['Comprobar', 'Leer'] }}"
              sequence:
                - action: browser_mod.notification
                  data:
                    message: "⏳ Acerque el Tag al lector de escritorio..."
                    duration: 5000
                
                - action: rest_command.ad5x_nfc_read_server
                  response_variable: resultado

                - if:
                    - condition: template
                      value_template: "{{ resultado is defined and resultado.status == 200 }}"
                  then:
                    - choose:
                        - conditions:
                            - condition: template
                              value_template: "{{ resultado.content.status == 'empty' }}"
                          sequence:
                            - action: browser_mod.notification
                              data:
                                message: "ℹ️ El Tag está vacío o no tiene formato."
                                duration: 4000
                        - conditions:
                            - condition: template
                              value_template: "{{ resultado.content.id is defined }}"
                          sequence:
                            - variables:
                                id_leido: "{{ resultado.content.id }}"
                            
                            - action: input_text.set_value
                              target:
                                entity_id: input_text.ad5x_ultimo_nfc_id
                              data:
                                value: "{{ id_leido }}"

                            - if:
                                - condition: template
                                  value_template: "{{ operacion == 'Comprobar' }}"
                              then:
                                - action: script.ad5x_nfc_popup_info
                                  data:
                                    id_tag: "{{ id_leido }}"
                            
                            - if:
                                - condition: template
                                  value_template: "{{ operacion == 'Leer' }}"
                              then:
                                - action: script.ad5x_inventario_cargar
                                  continue_on_error: true
                                  data:
                                    id_tag: "{{ id_leido }}"
                                    slot_tag: "{{ slot }}"
                  else:
                    - action: browser_mod.notification
                      data:
                        message: "❌ Error de lectura o servidor no encontrado"
            - conditions:
                - condition: template
                  value_template: "{{ operacion == 'Escribir' }}"
              sequence:
                - action: script.ad5x_nfc_write_bobina
                  data:
                    origen: "inventario"

            # --- CASO BORRAR ---
            - conditions:
                - condition: template
                  value_template: "{{ operacion == 'Borrar' }}"
              sequence:
                - action: browser_mod.notification
                  data:
                    message: "🧹 Preparando borrado... Acerque el Tag al lector."
                    duration: 4000
                - action: rest_command.ad5x_nfc_clear_server
                  response_variable: resultado_borrar

                - if:
                    - condition: template
                      value_template: "{{ resultado_borrar is defined and resultado_borrar.status == 200 }}"
                  then:
                    - action: browser_mod.notification
                      data:
                        message: "✅ Tag formateado con éxito."
                  else:
                    - action: browser_mod.notification
                      data:
                        message: "❌ Error: No se pudo borrar o servidor offline."

        - action: input_select.select_option
          target:
            entity_id: input_select.ad5x_nfc_operacion
          data:
            option: "Comprobar"
    ad5x_nfc_popup_info:
      alias: "AD5X - NFC: Comprobar Tag"
      fields:
        id_tag:
          description: "ID de la bobina"
      sequence:
        - variables:
            inv: "{{ state_attr('sensor.ad5x_inventario_datos', 'lista') }}"
            bobina: "{{ inv | selectattr('id', 'eq', id_tag | string) | first if inv is not none else none }}"

        - if:
            - condition: template
              value_template: "{{ bobina is not none }}"
          then:
            - action: browser_mod.popup
              data:
                title: "🆔 {{ bobina.id }}"
                icon: mdi:identifier
                style: |
                  --popup-min-width: 500px;
                  --popup-border-color: {{ bobina.color }};
                  --popup-border-width: 2px;
                content:
                  type: custom:layout-card
                  layout_type: custom:grid-layout
                  layout:
                    grid-template-columns: 1fr 1fr
                    grid-gap: 8px
                  cards:
                    - type: vertical-stack
                      cards:
                        - type: custom:mushroom-template-card
                          primary: Material
                          secondary: "{{ bobina.material }}"
                          icon: mdi:layers
                          icon_color: blue
                        - type: custom:mushroom-template-card
                          primary: Peso Restante
                          secondary: "{{ bobina.peso }} g"
                          icon: mdi:scale
                          icon_color: orange
                        - type: custom:mushroom-template-card
                          primary: Densidad
                          secondary: "{{ bobina.densidad }} g/cm³"
                          icon: mdi:flask-outline
                          icon_color: deep-orange
                        - type: custom:mushroom-template-card
                          primary: Apertura
                          secondary: "{{ bobina.fecha }}"
                          icon: mdi:calendar-import
                          icon_color: teal
                    - type: vertical-stack
                      cards:
                        - type: custom:mushroom-template-card
                          primary: Tipo / Estilo
                          secondary: "{{ bobina.submaterial }}"
                          icon: mdi:database
                          icon_color: indigo
                        - type: custom:mushroom-template-card
                          primary: Long. Restante
                          secondary: "{{ (bobina.longitud / 1000) | round(2) }} m"
                          icon: mdi:ruler
                          icon_color: brown
                        - type: custom:mushroom-template-card
                          primary: Fabricante
                          secondary: "{{ bobina.fabricante }}"
                          icon: mdi:factory
                          icon_color: green
                        - type: custom:mushroom-template-card
                          primary: Último Uso
                          secondary: "{{ bobina.ultimo_uso if bobina.ultimo_uso != '' else 'N/A' }}"
                          icon: mdi:history
                          icon_color: grey
                    - type: custom:button-card
                      view_layout:
                        grid-column: span 2
                      styles:
                        card:
                          - background-color: "{{ bobina.color }}"
                          - height: 3px
                          - border-radius: 5px
                          - margin-top: 5px

    ad5x_nfc_write_bobina:
      alias: "AD5X - NFC: Maestro de Escritura"
      fields:
        id_bobina:
          description: "ID de la bobina a grabar"
        origen:
          description: "browser o mobile"
      sequence:
        - variables:
            id_buscado: >
              {% if origen == 'inventario' %}
                {# Caso crítico: Forzamos lectura del servidor para evitar el 'fantasma' del popup #}
                {{ states('input_select.ad5x_selected_inventory') | trim }}
              {% elif id_bobina is defined and id_bobina | string | length > 2 %}
                {# Si nos pasan un ID específico y no es el caso del inventario, lo usamos #}
                {{ id_bobina | trim }}
              {% else %}
                {# Por defecto, el editor manual #}
                {{ states('input_text.ad5x_id_editor') | trim }}
              {% endif %}
            es_browser: "{{ origen != 'mobile' }}"

        - if:
            - condition: template
              value_template: "{{ es_browser }}"
          then:
            - action: browser_mod.popup
              data:
                id: nfc_workflow
                title: "📶 Grabando Tag..."
                content:
                  type: markdown
                  content: "### <center>Acerque el Tag al lector</center>\nEsperando 10s para ID: **{{ id_buscado }}**"
            - action: notify.mobile_app_your_phone
              continue_on_error: true
              data:
                message: "clear_notification"
                data:
                  tag: "nfc_workflow_mobile"   
                  
          else:
            - action: notify.mobile_app_your_phone
              data:
                title: "📶 NFC"
                message: "⏳ Preparando grabación de {{ id_buscado }}... Acerque el tag."
                data:
                    tag: "nfc_workflow_mobile"
            
            - action: browser_mod.close_popup
              data:
                id: nfc_workflow               

        - variables:
            datos: >
              {% set inventario = state_attr('sensor.ad5x_inventario_datos', 'lista') %}
              {{ inventario | selectattr('id', 'eq', id_buscado) | first | default(none) }}

        - if:
            - condition: template
              value_template: "{{ datos != none }}"
          then:
            - action: rest_command.ad5x_nfc_write_server
              data:
                datos_bobina: "{{ datos }}"
              response_variable: resultado

            - if:
                - condition: template
                  value_template: "{{ resultado['status'] == 200 and resultado['content']['status'] == 'success' }}"
              then:
                - action: persistent_notification.dismiss
                  data:
                    notification_id: nfc_pending            

                - if:
                    - condition: template
                      value_template: "{{ es_browser }}"
                  then:
                    - action: browser_mod.popup
                      data:
                        id: nfc_workflow
                        title: "✅ ¡ÉXITO!"
                        content: "Tag para **{{ id_buscado }}** grabado."
                    - delay: "00:00:04"     
                    - action: browser_mod.close_popup
                      data:
                        id: nfc_workflow
                  else:
                    - action: notify.mobile_app_your_phone
                      data:
                        title: "✅ NFC Éxito"
                        message: "Tag {{ id_buscado }} grabado correctamente."
                        data:
                            tag: "nfc_workflow_mobile"
                - delay: "00:00:05"
                - action: notify.mobile_app_your_phone
                  data:
                    message: "clear_notification"
                    data:
                      tag: "nfc_workflow_mobile"
              else:
                - if:
                    - condition: template
                      value_template: "{{ es_browser }}"
                  then:
                    - action: browser_mod.popup
                      data:
                        id: nfc_workflow
                        title: "⚠️ Fallo"
                        content:
                          type: vertical-stack
                          cards:
                            - type: markdown
                              content: "Error al grabar. ¿Reintentar?"
                            - type: custom:button-card
                              name: REINTENTAR
                              tap_action:
                                action: call-service
                                service: script.ad5x_nfc_write_bobina
                                data:
                                  id_bobina: "{{ id_buscado }}"
                  else:
                    - action: notify.mobile_app_your_phone
                      data:
                        title: "⚠️ Error NFC"
                        message: "No se pudo grabar {{ id_buscado }}. Reintente desde el PC."
                    - delay: "00:00:05"
                    - action: notify.mobile_app_your_phone
                      data:
                        message: "clear_notification"
                        data:
                          tag: "nfc_workflow_mobile"
