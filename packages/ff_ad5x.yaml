    ad5x_ifs_sincronizar_bobina:
        alias: "AD5X - IFS: Sincronizar Datos de Bobina"
        fields:
          slot:
            description: "Slot a calcular (1-4)"
          calcular:
            description: "Qué valor obtener: 'longitud', 'peso' o 'densidad'"
        sequence:
          - service: input_number.set_value
            target:
              entity_id: "input_number.ad5x_ifs_slot_{{ calcular }}"
            data:
              value: >
                {% set L = states('input_number.ad5x_ifs_slot_longitud') | float(0) %}
                {% set D = states('input_number.ad5x_ifs_slot_densidad') | float(1.24) %}
                {% set P = states('input_number.ad5x_ifs_slot_peso') | float(0) %}
                
                {% if calcular == 'longitud' %}
                  {# Evitamos división por cero en densidad #}
                  {% if D > 0 %}
                    {{ (P * 1000 / (D * 2.4053)) | round(0) }}
                  {% else %}
                    0
                  {% endif %}
                {% elif calcular == 'peso' %}
                  {{ (L * D * 2.4053 / 1000) | round(1) }}
                {% elif calcular == 'densidad' %}
                  {% if L > 0 %}
                    {{ (P * 1000 / (L * 2.4053)) | round(3) }}
                  {% else %}
                    {{ D }}
                  {% endif %}
                {% endif %}            
    ad5x_ifs_actualizar_json_slot:
      alias: "AD5X - IFS: Guardar datos al JSON (Híbrido)"
      mode: restart
      fields:
        volcar:
            description: "¿Sincronizar con el archivo físico? (default: true)"
            example: false
        slot_id:
          description: "ID del slot (1-4 o 5)"
        id:
          description: "ID de bobina"
        material:
          description: "Material"
        submaterial:
          description: "Submaterial"
        color:
          description: "Color hexadecimal"
        densidad:
          description: "Densidad"
        peso:
          description: "Peso"
        longitud:
          description: "Longitud"
        fabricante:
          description: "Fabricante"
        fecha:
          description: "Fecha de apertura"

      sequence:
        - action: input_text.set_value
          target:
            entity_id: "input_text.ad5x_ifs_slot{{ slot_id }}_json"
          data:
            value: >
              {# 1. Base JSON #}
              {% set current = states('input_text.ad5x_ifs_slot' ~ slot_id ~ '_json') %}
              {% set j = current | from_json if current not in [unknown, none, ''] else {} %}
              
              {# 2. Lógica Híbrida (Prioridad Parámetro > Editor) #}
              {% set id_f = id if id is defined else states('input_text.ad5x_id_editor') %}
              {% set mat_f = material if material is defined else states('input_text.ad5x_material_editor') %}
              {% set sub_f = submaterial if submaterial is defined else states('input_text.ad5x_submaterial_editor') %}
              {% set col_f = color if color is defined else states('input_text.ad5x_color_editor') %}
              {% set fab_f = fabricante if fabricante is defined else states('input_select.ad5x_fabricante_selected') %}
              {% set fec_f = fecha if fecha is defined else states('input_text.ad5x_fecha_editor') %}
              {% set ult_f = ultimo_uso if ultimo_uso is defined else (j.ultimo_uso if j.ultimo_uso is defined else '') %}
              
              {% set den_f = densidad if densidad is defined else states('input_number.ad5x_ifs_slot_densidad') %}
              {% set pes_f = peso if peso is defined else states('input_number.ad5x_ifs_slot_peso') %}
              {% set lon_f = longitud if longitud is defined else states('input_number.ad5x_ifs_slot_longitud') %}

              {# 3. Fusión final con las llaves ORIGINALES (id, material, peso, etc.) #}
              {{ j | combine({
                'id': id_f | upper | trim if id_f is string else id_f,
                'material': mat_f | trim if mat_f is string else mat_f,
                'submaterial': sub_f | upper | trim if sub_f is string else sub_f,
                'color': col_f | upper | trim if col_f is string else col_f,
                'densidad': den_f | float | round(3),
                'peso': pes_f | float | round(2),
                'longitud': lon_f | float | round(1),
                'fabricante': fab_f | trim if fab_f is string else fab_f,
                'fecha': fec_f,
                'ultimo_uso': ult_f
              }) | to_json }}

        - if:
            - condition: template
              value_template: "{{ volcar if volcar is defined else true }}"
          then:
            - action: shell_command.ad5x_inventario_vuelco
              data:
                datos_json: "{{ states('input_text.ad5x_ifs_slot' ~ slot_id ~ '_json') }}"
            
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.ad5x_inventario_datos
                
    ad5x_ifs_guardar_y_enviar:
        alias: "AD5X - IFS: Guardar Local y Enviar a Impresora"
        mode: restart
        fields:
          slot_id:
            description: "ID del slot (1-4)"
        sequence:
          - action: script.ad5x_ifs_actualizar_json_slot
            data:
              slot_id: "{{ slot_id }}"

          - action: rest_command.ad5x_ifs_configurar_slot
            data:
              slot: "{{ slot_id | int }}"
              material: "{{ states('input_text.ad5x_material_editor') }}"
              color: "{{ states('sensor.ad5x_ifs_color_impresora') }}"
    ad5x_ifs_carga_descarga:
