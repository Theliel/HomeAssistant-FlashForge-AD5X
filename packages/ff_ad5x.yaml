        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {{ info.slotInfos[2].materialColor if info and info.slotInfos is defined else 'none' }}
      has_filament: >
        {{ state_attr('sensor.flashforge_ad5x', 'matlStationInfo').slotInfos[0].hasFilament }}                

  - name: "AD5X - IFS: Slot 4"
    unique_id: "ad5x_ifs_slot_4"
    icon: mdi:printer-3d-nozzle-outline
    state: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {% if info and info.slotInfos is defined and info.slotInfos[3].hasFilament %}
          {{ info.slotInfos[3].materialName }}
        {% else %}
          Vacío
        {% endif %}
    attributes:
      color: >
        {% set info = state_attr('sensor.flashforge_ad5x', 'matlStationInfo') %}
        {{ info.slotInfos[3].materialColor if info and info.slotInfos is defined else 'none' }}
      has_filament: >
        {{ state_attr('sensor.flashforge_ad5x', 'matlStationInfo').slotInfos[0].hasFilament }}

  - name: "AD5X - IFS: Slot 1 Unificado"
    unique_id: ad5x_slot1_full
    icon: mdi:printer-3d-nozzle-outline
    state: "{{ states('sensor.ad5x_ifs_slot_1') }}"
    attributes:
          id_bobina: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).id }}"
          fabricante: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).fabricante }}"
          submaterial: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).submaterial }}"
          color_tag: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).color }}"
          densidad: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).densidad | float(1.23) }}"
          peso_restante: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).peso | float(0) }}"
          longitud_restante: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).longitud | float(0) }}"
          fecha_apertura: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).fecha }}"
          fecha_uso: "{{ (states('input_text.ad5x_ifs_slot1_json') | from_json).ultimo_uso }}"
          has_filament: "{{ state_attr('sensor.ad5x_ifs_slot_1', 'has_filament') }}"
          color_impresora: "{{ state_attr('sensor.ad5x_ifs_slot_1', 'color') }}"
  - name: "AD5X - IFS: Slot 2 Unificado"
    unique_id: ad5x_slot2_full
    icon: mdi:printer-3d-nozzle-outline
