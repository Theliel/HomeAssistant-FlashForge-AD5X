          longitud_restante: "{{ (states('input_text.ad5x_ifs_slot2_json') | from_json).longitud | float(0) }}"
          fecha_apertura: "{{ (states('input_text.ad5x_ifs_slot2_json') | from_json).fecha }}"
          fecha_uso: "{{ (states('input_text.ad5x_ifs_slot2_json') | from_json).ultimo_uso }}"          
          has_filament: "{{ state_attr('sensor.ad5x_ifs_slot_2', 'has_filament') }}"
          color_impresora: "{{ state_attr('sensor.ad5x_ifs_slot_2', 'color') }}"
  - name: "AD5X - IFS: Slot 3 Unificado"
    unique_id: ad5x_slot3_full
    icon: mdi:printer-3d-nozzle-outline
    state: "{{ states('sensor.ad5x_ifs_slot_3') }}"
    attributes:
          id_bobina: "{{ (states('input_text.ad5x_ifs_slot3_json') | from_json).id }}"
          fabricante: "{{ (states('input_text.ad5x_ifs_slot3_json') | from_json).fabricante }}"
